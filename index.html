<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moyo｜パターン画像ジェネレーター</title>
<meta name="description" content="パターン背景・テキスト・透過に対応したシンプルな画像ジェネレーター。ブラウザだけでサクッと作成。">
<!-- OGP / Twitter Card ：公開URLに合わせて https://example.com/ の部分を実際のドメインに書き換えてください -->
<meta property="og:title" content="Moyo">
<meta property="og:description" content="パターン背景・テキスト・透過に対応したシンプルな画像ジェネレーター。ブラウザだけでサクッと作成。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tsubuan820.github.io/moyo/">
<meta property="og:image" content="https://tsubuan820.github.io/moyo/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Moyo">
<meta name="twitter:description" content="パターン・テキスト・透過に対応した画像ジェネレーター。">
<meta name="twitter:image" content="https://tsubuan820.github.io/moyo/ogp.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Emoji&display=swap" rel="stylesheet">
<style>
  :root {
    --border: #e4e4e2;
    --border-strong: #d2d2cf;
    --text: #2b2a28;
    --muted: #8f8e8a;
    --accent: #2b2a28;
    --chrome-bg: #2b2a28;
    --stage: #e9e9e6;
    --panel: #ffffff;
    --field: #f4f4f2;
    --blue: #4a7cff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--stage);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 13px;
  }
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ===== Top toolbar ===== */
  .topbar {
    flex: none; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    background: var(--chrome-bg); color: #fff;
    border-bottom: 1px solid #000;
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .logo {
    width: 26px; height: 26px; border-radius: 6px; flex: none;
    background: #9a6bb4;
    display: grid; place-items: center; font-size: 14px;
  }
  .brand > div { min-width: 0; }
  .brand-title { font-size: 13px; font-weight: 650; letter-spacing: -0.01em; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand-sub { font-size: 11px; color: rgba(255,255,255,.5); line-height: 1.2; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-actions { display: flex; gap: 8px; flex: none; }

  /* ===== Workspace ===== */
  .workspace { flex: 1; display: flex; min-height: 0; }

  /* ===== Inspector (left panel) ===== */
  .inspector {
    flex: none; width: 264px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-gutter: stable;     /* スクロールバー分を常に確保し、出現時の再レイアウト（ぎゅっと）を防ぐ */
  }
  .group { border-bottom: 1px solid var(--border); padding: 9px 16px; }
  .group-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--muted); margin: 0 0 8px;
  }
  .field { margin-bottom: 9px; }
  .field:last-child { margin-bottom: 0; }
  .field-label { display:block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }

  /* presets / pattern chips */
  .presets { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .chip {
    border: 1px solid var(--border); background: var(--field); color: var(--text);
    border-radius: 7px; padding: 6px 4px; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all .12s ease; line-height: 1.15; text-align: center;
  }
  .chip small { display: block; color: var(--muted); font-size: 9px; font-weight: 500; margin-top: 2px; }
  .chip:hover { border-color: var(--border-strong); background: #fff; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip.active small { color: rgba(255,255,255,.6); }

  .pat-chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .pat-chip {
    border: 1px solid var(--border); background: var(--field); color: var(--text);
    border-radius: 8px; padding: 6px 4px 5px; cursor: pointer; transition: all .12s ease;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .pat-chip:hover { border-color: var(--border-strong); background: #fff; }
  .pat-chip.active { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 1px var(--accent); }
  .pat-chip canvas { width: 38px; height: 30px; border-radius: 4px; display: block; }
  .pat-chip span { font-size: 10.5px; font-weight: 600; line-height: 1; }

  /* dimension fields */
  .dims { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .num-field {
    display: flex; align-items: center; background: var(--field);
    border: 1px solid var(--border); border-radius: 7px; padding: 0 8px;
    transition: border-color .12s ease;
  }
  .num-field:focus-within { border-color: var(--blue); background: #fff; }
  .num-field .cap { font-size: 11px; font-weight: 700; color: var(--muted); flex: none; }
  .num-field input { border: none !important; background: none !important; padding: 7px 6px !important; }
  input[type="text"], input[type="number"] {
    width: 100%; border: 1px solid var(--border); border-radius: 7px;
    padding: 7px 10px; font-size: 13px; font-family: inherit; background: var(--field); color: var(--text);
  }
  input[type="number"] { font-variant-numeric: tabular-nums; }
  input:focus { outline: none; border-color: var(--blue); background: #fff; }
  input[type=number]::-webkit-inner-spin-button { opacity: .35; }
  input::placeholder, textarea::placeholder { color: #cdccc8; }
  #label {
    width: 100%; border: 1px solid var(--border); border-radius: 7px;
    padding: 7px 10px; font-size: 13px; font-family: inherit; background: var(--field); color: var(--text);
    resize: vertical; min-height: 34px; line-height: 1.4; display: block;
  }
  #label:focus { outline: none; border-color: var(--blue); background: #fff; }
  .select {
    width: 100%; border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px;
    font-size: 13px; font-family: inherit; background: var(--field); color: var(--text); cursor: pointer;
  }
  .select:focus { outline: none; border-color: var(--blue); background: #fff; }

  /* swatches */
  .swatches { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; }
  .swatch {
    aspect-ratio: 1; width: 100%; height: auto; border-radius: 5px;
    border: 1px solid rgba(0,0,0,.1); cursor: pointer; padding: 0; transition: transform .08s ease;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active { box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px var(--blue); position: relative; z-index: 1; }

  /* セクション見出し（右端にカスタム色ボタン） */
  .group-head { display: flex; align-items: center; justify-content: space-between; margin: 0 0 8px; }
  .group-head .group-title { margin: 0; }
  .mini-well {
    position: relative; width: 22px; height: 22px; border-radius: 6px; flex: none;
    border: 1px solid var(--border-strong); overflow: hidden; cursor: pointer;
  }
  .mini-well input[type="color"] {
    position: absolute; top: -6px; left: -6px; width: 40px; height: 40px;
    padding: 0; border: none; background: none; cursor: pointer;
  }
  .mini-well::after {
    content: ""; position: absolute; right: 1px; bottom: 1px; width: 8px; height: 8px;
    border-radius: 2px 0 4px 0; background: rgba(0,0,0,.18);
    -webkit-mask: linear-gradient(135deg, transparent 45%, #000 45%);
            mask: linear-gradient(135deg, transparent 45%, #000 45%);
    pointer-events: none;
  }
  .mini-well.active { box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px var(--blue); }

  /* misc fields */
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .toggle { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--text); cursor: pointer; }
  .toggle input { accent-color: var(--blue); }
  /* segmented control */
  .seg { display: flex; width: 100%; background: var(--field); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 3px; }
  .seg-btn {
    flex: 1; border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 12px; font-weight: 600; color: var(--muted); padding: 7px 4px; border-radius: 6px;
    transition: all .12s ease; line-height: 1.2;
  }
  .seg-btn:hover { color: var(--text); }
  .seg-btn.active { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.14); }
  .ctrl-dep.is-disabled, .text-dep.is-disabled { opacity: .4; pointer-events: none; }
  .reset-row { padding: 14px 16px 2px; text-align: center; }
  .reset-link {
    border: none; background: none; color: var(--muted); cursor: pointer;
    font-family: inherit; font-size: 12px; padding: 0;
  }
  .reset-link:hover { color: var(--text); text-decoration: underline; }
  .sig { text-align: center; font-size: 11px; color: var(--muted); padding: 12px 16px 16px; }
  .sig .heart { color: #e53935; }
  .sig a { color: var(--muted); text-decoration: none; transition: color .2s; }
  .sig a:hover { color: var(--blue); }
  .size-row { display: flex; align-items: center; gap: 10px; }
  .slider { -webkit-appearance: none; appearance: none; flex: 1; width: 100%; height: 16px;
    background: transparent; outline: none; cursor: pointer; }
  .slider::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; background: var(--border-strong); }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; margin-top: -6px; width: 16px; height: 16px;
    border-radius: 50%; background: #fff; border: 1px solid var(--border-strong); box-shadow: 0 1px 3px rgba(0,0,0,.25); cursor: pointer; }
  .slider::-moz-range-track { height: 4px; border-radius: 4px; background: var(--border-strong); }
  .slider::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #fff;
    border: 1px solid var(--border-strong); box-shadow: 0 1px 3px rgba(0,0,0,.25); cursor: pointer; }
  .px-field { display: flex; align-items: center; background: var(--field); border: 1px solid var(--border);
    border-radius: 7px; padding: 0 4px 0 8px; flex: none; width: 84px; }
  .px-field:focus-within { border-color: var(--blue); background: #fff; }
  .px-field input { border: none !important; background: none !important; padding: 7px 2px !important; text-align: right; width: 100%; font-variant-numeric: tabular-nums; }
  .px-field .unit { font-size: 11px; color: var(--muted); flex: none; padding-right: 4px; }
  .px-field input::-webkit-inner-spin-button { opacity: .4; }

  /* ===== Canvas stage ===== */
  .canvas-stage {
    flex: 1; min-width: 0; position: relative;
    display: flex; align-items: center; justify-content: center;
    background-color: var(--stage);
    background-image: radial-gradient(circle, rgba(0,0,0,.07) 1px, transparent 1px);
    background-size: 22px 22px;
    overflow: auto; padding: 40px;
  }
  .frame { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .frame-name { width: 100%; }
  .frame-name input {
    border: none; border-bottom: 1px solid transparent; background: none;
    font-family: inherit; font-size: 12px; color: var(--muted);
    padding: 2px 4px 3px 0; width: auto; max-width: 100%;
    border-radius: 0; text-overflow: ellipsis;
    transition: border-color .12s ease, color .12s ease;
  }
  .frame-name input::placeholder { color: var(--muted); opacity: .7; }
  .frame-name input:hover { color: var(--text); border-bottom-color: var(--border-strong); }
  .frame-name input:focus { outline: none; color: var(--text); border-bottom-color: var(--blue); }
  .artboard-wrap { line-height: 0; }
  .artboard-wrap.is-transparent {
    background-color: #fff;
    background-image:
      linear-gradient(45deg, #dcdcd9 25%, transparent 25%),
      linear-gradient(-45deg, #dcdcd9 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #dcdcd9 75%),
      linear-gradient(-45deg, transparent 75%, #dcdcd9 75%);
    background-size: 18px 18px;
    background-position: 0 0, 0 9px, 9px -9px, -9px 0;
  }
  canvas#canvas {
    display: block; width: auto; height: auto;
    box-shadow: 0 2px 14px rgba(40,44,62,.10), 0 1px 2px rgba(40,44,62,.06);
  }

  .statusbar {
    position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
    background: rgba(43,42,40,.92); color: #fff; backdrop-filter: blur(6px);
    font-size: 11px; font-variant-numeric: tabular-nums; letter-spacing: .02em;
    padding: 6px 12px; border-radius: 20px; white-space: nowrap; pointer-events: none;
  }

  .zoombar {
    position: absolute; right: 16px; bottom: 16px;
    display: flex; align-items: center; gap: 2px;
    background: rgba(43,42,40,.92); color: #fff; backdrop-filter: blur(6px);
    padding: 4px; border-radius: 20px;
  }
  .zoombar button {
    border: none; background: none; color: #fff; cursor: pointer; font-family: inherit;
    font-size: 13px; line-height: 1; padding: 5px 8px; border-radius: 14px; min-width: 28px;
  }
  .zoombar button:hover { background: rgba(255,255,255,.15); }
  .zoombar .zoom-val { font-variant-numeric: tabular-nums; font-size: 11px; min-width: 46px; font-weight: 600; }
  .zoombar .fit { font-size: 11px; font-weight: 600; }
  .zoombar .zsep { width: 1px; height: 16px; background: rgba(255,255,255,.18); margin: 0 2px; }

  button.btn {
    border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color: #fff;
    border-radius: 7px; padding: 7px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all .12s ease; white-space: nowrap;
  }
  button.btn:hover { background: rgba(255,255,255,.16); }
  button.btn.ghost { background: none; border-color: rgba(255,255,255,.22); color: rgba(255,255,255,.85); }
  button.btn.ghost:hover { background: rgba(255,255,255,.1); color: #fff; }
  button.btn.primary {
    background: #9a6bb4; border-color: transparent; color: #fff;
    display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; font-size: 13px;
    box-shadow: 0 2px 10px rgba(154,107,180,.5);
  }
  button.btn.primary:hover { filter: brightness(1.06); }
  button.btn.primary .ico { font-size: 15px; line-height: 1; }

  .toast {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--blue); color: #fff; padding: 10px 18px; border-radius: 8px;
    font-size: 13px; opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 10;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px) {
    .workspace { flex-direction: column; }
    .inspector { width: 100%; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
  }
  @media (max-width: 480px) {
    .topbar { padding: 0 10px; gap: 8px; }
    .brand-sub { display: none; }
    .topbar-actions { gap: 6px; }
    button.btn { padding: 7px 11px; }
    button.btn.primary { padding: 7px 13px; font-size: 12px; }
    button.btn.primary .ico { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- ===== Top toolbar ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="logo"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="6" cy="6" r="2.2" fill="#fff"/><circle cx="12" cy="6" r="2.2" fill="#fff"/><circle cx="18" cy="6" r="2.2" fill="#fff"/>
        <circle cx="6" cy="12" r="2.2" fill="#fff"/><circle cx="12" cy="12" r="2.2" fill="#fff"/><circle cx="18" cy="12" r="2.2" fill="#fff"/>
        <circle cx="6" cy="18" r="2.2" fill="#fff"/><circle cx="12" cy="18" r="2.2" fill="#fff"/><circle cx="18" cy="18" r="2.2" fill="#fff"/>
      </svg></span>
      <div>
        <div class="brand-title">Moyo</div>
        <div class="brand-sub">パターン・テキスト・透過に対応した画像ジェネレーター</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn ghost" id="copy">コピー</button>
      <button class="btn primary" id="download"><span class="ico">⤓</span>PNG書き出し</button>
    </div>
  </header>

  <div class="workspace">
    <!-- ===== Left inspector ===== -->
    <aside class="inspector">
      <!-- サイズ・形 -->
      <div class="group">
        <div class="group-title">サイズ・形</div>
        <div class="field">
          <label class="field-label">プリセット</label>
          <div class="presets" id="presets"></div>
        </div>
        <div class="field">
          <label class="field-label">寸法 (px)</label>
          <div class="dims">
            <span class="num-field"><span class="cap">W</span><input type="number" id="w" min="1" max="4000" value="1500"></span>
            <span class="num-field"><span class="cap">H</span><input type="number" id="h" min="1" max="4000" value="600"></span>
          </div>
        </div>
        <div class="field">
          <label class="field-label">角丸 (px)</label>
          <div class="size-row">
            <input type="range" id="radius" class="slider" min="0" max="300" step="1" value="0">
            <span class="px-field"><input type="number" id="radiusPx" min="0" value="0"><span class="unit">px</span></span>
          </div>
        </div>
      </div>

      <!-- 背景 -->
      <div class="group">
        <div class="group-head">
          <span class="group-title">背景</span>
          <span class="mini-well"><input type="color" id="customBg" value="#e5f2fc" title="自由に色を選ぶ"></span>
        </div>
        <label class="toggle" id="transToggleWrap"><input type="checkbox" id="transparent"> 背景を透過する</label>
        <div class="ctrl-dep" id="bgColorField" style="margin-top: 9px;">
          <div class="swatches" id="bgSwatches"></div>
        </div>
      </div>

      <!-- 模様 -->
      <div class="group">
        <div class="group-title">模様</div>
        <label class="toggle"><input type="checkbox" id="showPattern" checked> 模様を入れる</label>
        <div class="pat-chips ctrl-dep" id="patChips" style="margin-top: 9px;"></div>
      </div>

      <!-- 模様の調整 -->
      <div class="group" id="patAdjustGroup">
        <div class="group-title">模様の調整</div>
        <div class="field" id="dirField" hidden>
          <label class="field-label">向き</label>
          <div class="seg" id="stripeDir"></div>
        </div>
        <div class="field">
          <label class="field-label">大きさ (px)</label>
          <div class="size-row">
            <input type="range" id="tile" class="slider" min="8" max="600" step="1" value="64">
            <span class="px-field"><input type="number" id="tilePx" min="8" max="600"><span class="unit">px</span></span>
          </div>
        </div>
        <div class="field ctrl-dep" id="thickField">
          <label class="field-label" id="thickLabel">太さ・密度</label>
          <div class="size-row">
            <input type="range" id="thick" class="slider" min="5" max="95" step="1" value="50">
            <span class="px-field"><input type="number" id="thickPct" min="5" max="95"><span class="unit">%</span></span>
          </div>
        </div>
        <div class="field">
          <label class="field-label">不透明度</label>
          <div class="size-row">
            <input type="range" id="patOpacity" class="slider" min="5" max="100" step="1" value="100">
            <span class="px-field"><input type="number" id="patOpacityPct" min="5" max="100"><span class="unit">%</span></span>
          </div>
        </div>
      </div>

      <!-- 模様の色 -->
      <div class="group" id="patColorGroup">
        <div class="group-head">
          <span class="group-title">模様の色</span>
          <span class="mini-well"><input type="color" id="customPat" value="#387dc9" title="自由に色を選ぶ"></span>
        </div>
        <div class="swatches" id="patSwatches"></div>
      </div>

      <!-- テキスト -->
      <div class="group">
        <div class="group-title">テキスト</div>
        <div class="field">
          <label class="toggle"><input type="checkbox" id="showText"> テキストを重ねる</label>
        </div>
        <div class="field text-dep">
          <textarea id="label" rows="2" placeholder="見出しや注釈を入力（改行OK）" spellcheck="false"></textarea>
        </div>
        <div class="field text-dep">
          <label class="field-label">フォント</label>
          <select id="fontFamily" class="select">
            <option value="sans">ゴシック体</option>
            <option value="serif">明朝体</option>
            <option value="rounded">丸ゴシック体</option>
            <option value="mono">等幅</option>
            <option value="emoji">絵文字（Noto Emoji）</option>
          </select>
        </div>
        <div class="field text-dep">
          <label class="field-label">文字サイズ (px)</label>
          <div class="size-row">
            <input type="range" id="fontScale" class="slider" min="0.2" max="3" step="0.05" value="1">
            <span class="px-field"><input type="number" id="fontPx" min="4" max="2000"><span class="unit">px</span></span>
          </div>
        </div>
      </div>

      <!-- 文字色 -->
      <div class="group" id="textColorGroup">
        <div class="group-head">
          <span class="group-title">文字色</span>
          <span class="mini-well"><input type="color" id="customText" value="#2c2c2b" title="自由に色を選ぶ"></span>
        </div>
        <div class="swatches" id="textSwatches"></div>
      </div>

      <div class="reset-row">
        <button class="reset-link" id="reset"><span class="rico">↺</span> デフォルトに戻す</button>
      </div>

      <div class="sig">
        Made with <span class="heart">♥</span> by <a href="https://x.com/tsubuan_sun" target="_blank" rel="noopener">Tsubuan</a> © 2026
      </div>
    </aside>

    <!-- ===== Canvas stage ===== -->
    <main class="canvas-stage" id="stage">
      <div class="frame">
        <div class="frame-name">
          <input id="frameName" type="text" spellcheck="false" placeholder="名称未設定">
        </div>
        <div class="artboard-wrap" id="artboard">
          <canvas id="canvas"></canvas>
        </div>
      </div>
      <div class="statusbar" id="meta"></div>
      <div class="zoombar">
        <button id="zoomOut" title="縮小">−</button>
        <button id="zoomReset" class="zoom-val" title="100%にリセット"><span id="zoomVal">100%</span></button>
        <button id="zoomIn" title="拡大">+</button>
        <span class="zsep"></span>
        <button id="zoomFit" class="fit" title="画面に合わせる">フィット</button>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  // ===== プリセット =====
  const presets = [
    { name: "Cover", w: 1500, h: 600, note: "Notionカバー" },
    { name: "Wide", w: 1600, h: 900, note: "16:9" },
    { name: "Square", w: 1000, h: 1000, note: "1:1" },
    { name: "Divider", w: 1200, h: 30, note: "罫線" },
  ];

  // ===== カラー（Notion正本準拠・ライトモード） =====
  const NAMES = ["デフォルト","グレー","ブラウン","オレンジ","イエロー","グリーン","ブルー","パープル","ピンク","レッド"];
  const INK = ["#2c2c2b","#7d7a75","#9f765a","#d27b2d","#cb9434","#50946e","#387dc9","#9a6bb4","#c14c8a","#cf5148"];
  const BG  = ["#ffffff","#f9f8f7","#f5ede9","#fbebde","#f9f3dc","#e8f1ec","#e5f2fc","#f3ebf9","#fae9f1","#fce9e7"];

  // ===== フォント（端末標準・外部読み込みなし） =====
  const FONTS = {
    sans:    "-apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif",
    serif:   "'Hiragino Mincho ProN', 'YuMincho', 'Yu Mincho', 'MS PMincho', Georgia, serif",
    rounded: "'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Quicksand', sans-serif",
    mono:    "'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace",
    emoji:   "'Noto Emoji', -apple-system, 'Hiragino Sans', sans-serif",
  };

  // ===== 模様 =====
  const PATTERNS = [
    { id: "dots",    name: "水玉",     usesThick: true,  thickLabel: "ドットの大きさ" },
    { id: "stripe",  name: "ストライプ", usesThick: true,  thickLabel: "線の太さ", dir: true },
    { id: "checker", name: "市松",     usesThick: false },
    { id: "gingham", name: "ギンガム",  usesThick: true,  thickLabel: "帯の太さ" },
    { id: "grid",    name: "方眼",     usesThick: true,  thickLabel: "線の太さ" },
    { id: "wave",    name: "波",       usesThick: true,  thickLabel: "線の太さ" },
  ];
  const STRIPE_DIRS = [
    { id: "v",  name: "縦" }, { id: "h",  name: "横" },
    { id: "d1", name: "／" }, { id: "d2", name: "＼" },
  ];
  // 全色 = 淡い(BG) 10色 + 濃い(INK) 10色（スウォッチは10列なので自動で2段になる）
  const ALLCOLORS = BG.concat(INK);

  const $ = (id) => document.getElementById(id);
  const wInput = $("w"), hInput = $("h"), labelInput = $("label");
  const canvas = $("canvas"), ctx = canvas.getContext("2d");
  const meta = $("meta");

  let state = {
    w: 1500, h: 600,
    // 背景
    transparent: false,
    bgIndex: 7, bg: BG[7],
    // 模様
    showPattern: true, pattern: "gingham", stripeDir: "v", tile: 64, thick: 0.5, patIndex: 17, patColor: INK[7], patOpacity: 0.3,
    // テキスト
    showText: false, label: "", font: "sans", fontScale: null, fontAuto: true,
    textIndex: 10, textColor: INK[0],
    // 共有
    radius: 0, preset: "Cover", frameName: "", zoom: 1, fitMode: true,
  };

  // ===== localStorage =====
  const KEY = "notiongen.v3";
  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }
  function load() { try { const raw = localStorage.getItem(KEY); if (raw) Object.assign(state, JSON.parse(raw)); } catch (e) {} }

  function patternDef(id) { return PATTERNS.find((p) => p.id === id) || PATTERNS[0]; }
  function patternOn() { return state.showPattern !== false; }

  // ===== 描画ユーティリティ =====
  function roundRectPath(c, x, y, w, h, r) {
    c.beginPath();
    if (c.roundRect) { c.roundRect(x, y, w, h, r); return; }
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }
  function alignStart(size, period) {
    const c = size / 2;
    return c - period * (Math.floor(c / period) + 1);
  }
  const TAU = Math.PI * 2;

  // 模様は常にキャンバス中央を基準に対称配置する
  const DRAW = {
    dots(c, w, h, T, r, fg) {
      const rad = Math.max(0.5, T * r * 0.5);
      c.fillStyle = fg;
      for (let y = alignStart(h, T), row = 0; y < h + T; y += T, row++) {
        const ox = (row & 1) ? T / 2 : 0;
        for (let x = alignStart(w, T); x < w + T; x += T) {
          c.beginPath(); c.arc(x + ox, y, rad, 0, TAU); c.fill();
        }
      }
    },
    stripe(c, w, h, T, r, fg, dir) {
      const bw = Math.max(1, T * r);
      c.fillStyle = fg;
      if (dir === "h") {
        for (let y = alignStart(h, T); y < h + T; y += T) c.fillRect(0, y - bw / 2, w, bw);
      } else if (dir === "d1" || dir === "d2") {
        const diag = Math.ceil(Math.sqrt(w * w + h * h));
        const n = Math.ceil(diag / T) + 1;
        c.save();
        c.translate(w / 2, h / 2);
        c.rotate(dir === "d1" ? -Math.PI / 4 : Math.PI / 4);
        for (let k = -n; k <= n; k++) c.fillRect(k * T - bw / 2, -diag, bw, diag * 2);
        c.restore();
      } else {
        for (let x = alignStart(w, T); x < w + T; x += T) c.fillRect(x - bw / 2, 0, bw, h);
      }
    },
    checker(c, w, h, T, r, fg) {
      c.fillStyle = fg;
      const sx = alignStart(w, T), sy = alignStart(h, T);
      for (let y = sy, ry = 0; y < h; y += T, ry++)
        for (let x = sx, rx = 0; x < w; x += T, rx++)
          if ((rx + ry) & 1) c.fillRect(x, y, T, T);
    },
    gingham(c, w, h, T, r, fg) {
      const band = Math.max(1, T * Math.min(0.9, Math.max(0.2, r)));
      const base = c.globalAlpha; // 模様の不透明度を踏襲
      c.save();
      c.fillStyle = fg; c.globalAlpha = base * 0.5;
      for (let x = alignStart(w, T); x < w + T; x += T) c.fillRect(x - band / 2, 0, band, h);
      for (let y = alignStart(h, T); y < h + T; y += T) c.fillRect(0, y - band / 2, w, band);
      c.restore();
    },
    grid(c, w, h, T, r, fg) {
      const lw = Math.max(1, Math.round(T * r * 0.18));
      c.fillStyle = fg;
      for (let x = alignStart(w, T); x < w + T; x += T) c.fillRect(x - lw / 2, 0, lw, h);
      for (let y = alignStart(h, T); y < h + T; y += T) c.fillRect(0, y - lw / 2, w, lw);
    },
    wave(c, w, h, T, r, fg) {
      const amp = T * 0.14, wl = T * 2.6;
      const lw = Math.max(1, T * (0.04 + r * 0.1));
      const step = Math.max(2, wl / 28);
      c.strokeStyle = fg; c.lineWidth = lw; c.lineCap = "round"; c.lineJoin = "round";
      for (let y = alignStart(h, T); y < h + T; y += T) {
        c.beginPath();
        for (let x = -wl, first = true; x <= w + wl; x += step) {
          const yy = y + amp * Math.cos((x - w / 2) / wl * TAU);
          if (first) { c.moveTo(x, yy); first = false; } else c.lineTo(x, yy);
        }
        c.stroke();
      }
    },
  };

  // ===== プリセット =====
  const presetsEl = $("presets");
  presets.forEach((p) => {
    const b = document.createElement("button");
    b.className = "chip"; b.dataset.name = p.name;
    b.innerHTML = p.name + "<small>" + p.w + "×" + p.h + "</small>";
    b.addEventListener("click", () => {
      state.w = p.w; state.h = p.h;
      wInput.value = p.w; hInput.value = p.h;
      state.fitMode = true;
      if (state.fontAuto !== false) applyAutoFont();
      syncRadius(); syncPreset(); syncFrameName(); render();
    });
    presetsEl.appendChild(b);
  });
  function syncPreset() {
    const m = presets.find((p) => p.w === state.w && p.h === state.h);
    state.preset = m ? m.name : null;
    [...presetsEl.children].forEach((c) => c.classList.toggle("active", !!m && c.dataset.name === m.name));
  }

  // ===== 模様チップ =====
  const patChipsEl = $("patChips");
  function buildPatChips() {
    patChipsEl.innerHTML = "";
    PATTERNS.forEach((p) => {
      const b = document.createElement("button");
      b.className = "pat-chip" + (state.pattern === p.id ? " active" : "");
      b.dataset.id = p.id;
      const mini = document.createElement("canvas");
      mini.width = 76; mini.height = 60;
      const span = document.createElement("span");
      span.textContent = p.name;
      b.appendChild(mini); b.appendChild(span);
      b.addEventListener("click", () => selectPattern(p.id));
      patChipsEl.appendChild(b);
      drawMini(mini, p.id);
    });
  }
  function drawMini(cv, id) {
    const c = cv.getContext("2d");
    const w = cv.width, h = cv.height;
    const mbg = "#f1f1ef", mfg = "#9a9893";
    c.fillStyle = mbg; c.fillRect(0, 0, w, h);
    const T = id === "grid" || id === "checker" ? 18 : 16;
    (DRAW[id] || DRAW.dots)(c, w, h, T, 0.5, mfg);
  }
  function selectPattern(id) {
    state.pattern = id;
    [...patChipsEl.children].forEach((c) => c.classList.toggle("active", c.dataset.id === id));
    updateLayerUI();
    syncFrameName();
    render();
  }
  $("showPattern").addEventListener("change", (e) => {
    state.showPattern = e.target.checked;
    updateLayerUI(); syncFrameName(); render();
  });

  // ===== ストライプの向き =====
  const stripeDirEl = $("stripeDir");
  function buildDirs() {
    stripeDirEl.innerHTML = "";
    STRIPE_DIRS.forEach((d) => {
      const b = document.createElement("button");
      b.className = "seg-btn" + (state.stripeDir === d.id ? " active" : "");
      b.dataset.d = d.id; b.textContent = d.name;
      b.addEventListener("click", () => {
        state.stripeDir = d.id;
        [...stripeDirEl.children].forEach((c) => c.classList.toggle("active", c.dataset.d === d.id));
        render();
      });
      stripeDirEl.appendChild(b);
    });
  }
  function updateDirVisible() {
    const def = patternDef(state.pattern);
    $("dirField").hidden = !(patternOn() && def.dir);
    [...stripeDirEl.children].forEach((c) => c.classList.toggle("active", c.dataset.d === state.stripeDir));
  }

  // ===== スウォッチ =====
  const bgSwatchesEl = $("bgSwatches"), patSwatchesEl = $("patSwatches"), textSwatchesEl = $("textSwatches");
  const customBg = $("customBg"), customPat = $("customPat"), customText = $("customText");
  const wellBg = customBg.parentElement, wellPat = customPat.parentElement, wellText = customText.parentElement;

  function setActive(container, idx) {
    [...container.querySelectorAll(".swatch")].forEach((s) =>
      s.classList.toggle("active", idx != null && Number(s.dataset.i) === idx));
  }
  function buildSwatches(container, colors, getIdx, onPick) {
    container.innerHTML = "";
    colors.forEach((hex, i) => {
      const b = document.createElement("button");
      b.className = "swatch" + (getIdx() === i ? " active" : "");
      b.style.background = hex; b.title = (NAMES[i % 10] || "") + (i < 10 ? "（淡）" : "（濃）"); b.dataset.i = i;
      b.addEventListener("click", () => { onPick(i); render(); });
      container.appendChild(b);
    });
  }

  // 背景色（淡い10色＋濃い10色）
  function applyBg(hex) { state.bg = hex; customBg.value = hex; }
  function selectBg(i) { state.bgIndex = i; applyBg(ALLCOLORS[i]); setActive(bgSwatchesEl, i); wellBg.classList.remove("active"); }
  customBg.addEventListener("input", () => applyCustomBg(customBg.value));
  function applyCustomBg(hex) { state.bgIndex = null; state.bg = hex; customBg.value = hex; setActive(bgSwatchesEl, null); wellBg.classList.add("active"); render(); }

  // 模様の色
  function applyPat(hex) { state.patColor = hex; customPat.value = hex; }
  function selectPat(i) { state.patIndex = i; applyPat(ALLCOLORS[i]); setActive(patSwatchesEl, i); wellPat.classList.remove("active"); }
  customPat.addEventListener("input", () => applyCustomPat(customPat.value));
  function applyCustomPat(hex) { state.patIndex = null; state.patColor = hex; customPat.value = hex; setActive(patSwatchesEl, null); wellPat.classList.add("active"); render(); }

  // 文字色
  function applyText(hex) { state.textColor = hex; customText.value = hex; }
  function selectText(i) { state.textIndex = i; applyText(ALLCOLORS[i]); setActive(textSwatchesEl, i); wellText.classList.remove("active"); }
  customText.addEventListener("input", () => applyCustomText(customText.value));
  function applyCustomText(hex) { state.textIndex = null; state.textColor = hex; customText.value = hex; setActive(textSwatchesEl, null); wellText.classList.add("active"); render(); }

  // カスタム色ボタン（mini-well）の選択リングを state に同期
  function syncWellActives() {
    wellBg.classList.toggle("active", state.bgIndex == null);
    wellPat.classList.toggle("active", state.patIndex == null);
    wellText.classList.toggle("active", state.textIndex == null);
  }

  // ===== 背景透過 =====
  function updateTransparent() {
    const on = !!state.transparent;
    $("bgColorField").classList.toggle("is-disabled", on);
    $("artboard").classList.toggle("is-transparent", on);
    $("transparent").checked = on;
  }
  $("transparent").addEventListener("change", (e) => { state.transparent = e.target.checked; updateTransparent(); render(); });

  // ===== 寸法 =====
  function clampDim(v) { v = parseInt(v, 10); if (isNaN(v) || v < 1) return 1; if (v > 4000) return 4000; return v; }
  function onDimChange() {
    state.fitMode = true; syncRadius(); syncPreset(); syncFrameName();
    if (state.fontAuto !== false) applyAutoFont();
    render();
  }
  wInput.addEventListener("input", () => { state.w = clampDim(wInput.value); onDimChange(); });
  hInput.addEventListener("input", () => { state.h = clampDim(hInput.value); onDimChange(); });

  // ===== 大きさ(tile) =====
  const tileSlider = $("tile"), tilePx = $("tilePx");
  function clampTile(v) { v = parseInt(v, 10); if (isNaN(v) || v < 8) return 8; if (v > 600) return 600; return v; }
  tileSlider.addEventListener("input", (e) => { state.tile = clampTile(e.target.value); if (document.activeElement !== tilePx) tilePx.value = state.tile; render(); });
  tilePx.addEventListener("input", (e) => { state.tile = clampTile(e.target.value); tileSlider.value = state.tile; render(); });

  // ===== 太さ・密度 =====
  const thickSlider = $("thick"), thickPct = $("thickPct");
  thickSlider.addEventListener("input", (e) => { state.thick = parseInt(e.target.value, 10) / 100; if (document.activeElement !== thickPct) thickPct.value = Math.round(state.thick * 100); render(); });
  thickPct.addEventListener("input", (e) => { let v = parseInt(e.target.value, 10); if (isNaN(v)) return; v = Math.max(5, Math.min(95, v)); state.thick = v / 100; thickSlider.value = v; render(); });
  function updateThickEnabled() {
    const def = patternDef(state.pattern);
    const on = def.usesThick !== false;
    $("thickField").classList.toggle("is-disabled", !on);
    thickSlider.disabled = !on; thickPct.disabled = !on;
    $("thickLabel").textContent = on ? (def.thickLabel || "太さ・密度") : "太さ・密度（この模様では無効）";
  }

  // ===== 模様の不透明度 =====
  const patOpacitySlider = $("patOpacity"), patOpacityPct = $("patOpacityPct");
  patOpacitySlider.addEventListener("input", (e) => {
    state.patOpacity = Math.max(5, Math.min(100, parseInt(e.target.value, 10))) / 100;
    if (document.activeElement !== patOpacityPct) patOpacityPct.value = Math.round(state.patOpacity * 100);
    render();
  });
  patOpacityPct.addEventListener("input", (e) => {
    let v = parseInt(e.target.value, 10); if (isNaN(v)) return;
    v = Math.max(5, Math.min(100, v));
    state.patOpacity = v / 100; patOpacitySlider.value = v; render();
  });

  // ===== テキスト =====
  function updateTextEnabled() {
    const on = state.showText !== false;
    [...document.querySelectorAll(".text-dep")].forEach((f) => {
      f.classList.toggle("is-disabled", !on);
      [...f.querySelectorAll("input, select, textarea")].forEach((el) => { el.disabled = !on; });
    });
  }
  labelInput.addEventListener("input", () => { state.label = labelInput.value; render(); ensureFontThenRender(); });
  $("showText").addEventListener("change", (e) => { state.showText = e.target.checked; if (state.showText && state.fontAuto !== false) applyAutoFont(); updateLayerUI(); syncFrameName(); render(); });
  $("fontFamily").addEventListener("change", (e) => { state.font = e.target.value; if (state.fontAuto !== false) applyAutoFont(); render(); ensureFontThenRender(); });

  // Webフォント（Noto Emoji）はキャンバス描画前に読み込み完了させる必要があるため、ロード後に再描画
  function ensureFontThenRender() {
    if (state.font === "emoji" && document.fonts && document.fonts.load) {
      const sample = (displayLabel() || "🎉") + "🎉"; // 入力中の絵文字そのものをロード対象に
      document.fonts.load("100px 'Noto Emoji'", sample).then(() => {
        if (state.fontAuto !== false) applyAutoFont();
        render();
      }).catch(() => {});
    }
  }

  const fontScaleInput = $("fontScale"), fontPx = $("fontPx");
  function autoBase() { return Math.max(14, Math.min(state.w, state.h) * 0.12); }
  function fontStack() { return FONTS[state.font] || FONTS.sans; }
  // 描画用ラベル。Noto Emoji時は各絵文字にテキスト表示セレクタ U+FE0E を付け、
  // OS のカラー絵文字フォントへの自動置換を抑止して Noto Emoji のモノクロ字形を使う（☕️等がカラーに化けるのを防ぐ）
  function displayLabel() {
    let s = (state.label || "").trim() ? state.label : "テキスト";
    if (state.font === "emoji") {
      try {
        s = s.replace(/️/g, "").replace(/\p{Extended_Pictographic}/gu, (m) => m + "︎");
      } catch (e) {
        s = s.replace(/️/g, ""); // 正規表現プロパティ非対応環境のフォールバック
      }
    }
    return s;
  }
  function idealFontSize() {
    const raw = displayLabel();
    const lines = raw.split("\n");
    ctx.font = "600 100px " + fontStack();
    let maxW = 1;
    lines.forEach((ln) => { maxW = Math.max(maxW, ctx.measureText(ln).width); });
    const byWidth = 100 * (state.w * 0.80) / maxW;
    const byHeight = lines.length === 1 ? state.h / 6 : (state.h * 0.78) / (lines.length * 1.25);
    return Math.max(8, Math.round(Math.min(byWidth, byHeight)));
  }
  function applyAutoFont() {
    state.fontScale = Math.min(3, Math.max(0.2, idealFontSize() / autoBase()));
    fontScaleInput.value = state.fontScale;
  }
  fontScaleInput.addEventListener("input", (e) => { state.fontScale = parseFloat(e.target.value); state.fontAuto = false; render(); });
  fontPx.addEventListener("input", (e) => {
    const px = parseInt(e.target.value, 10);
    if (!isNaN(px) && px > 0) {
      state.fontScale = Math.min(3, Math.max(0.2, px / autoBase()));
      state.fontAuto = false; fontScaleInput.value = state.fontScale; render();
    }
  });


  // ===== 角丸 =====
  const radiusSlider = $("radius"), radiusPx = $("radiusPx");
  function maxRadius() { return Math.floor(Math.min(state.w, state.h) / 2); }
  function clampRadius(r) { return Math.max(0, Math.min(r || 0, maxRadius())); }
  function syncRadius() {
    state.radius = clampRadius(state.radius);
    radiusSlider.max = maxRadius(); radiusSlider.value = state.radius;
    if (document.activeElement !== radiusPx) radiusPx.value = state.radius;
  }
  radiusSlider.addEventListener("input", (e) => { state.radius = clampRadius(parseInt(e.target.value, 10)); if (document.activeElement !== radiusPx) radiusPx.value = state.radius; render(); });
  radiusPx.addEventListener("input", (e) => { state.radius = clampRadius(parseInt(e.target.value, 10)); radiusSlider.value = state.radius; render(); });

  // ===== フレーム名 =====
  const frameNameInput = $("frameName");
  function autoFrameName() {
    const base = patternOn() ? patternDef(state.pattern).name : (state.showText ? "テキスト" : "無地");
    return base + "_" + state.w + "x" + state.h;
  }
  function frameFileName() {
    let n = (state.frameName || "").trim() || autoFrameName();
    const bad = '\\/:*?"<>|'; let out = "";
    for (let i = 0; i < n.length; i++) { const ch = n[i]; out += (bad.indexOf(ch) >= 0 || n.charCodeAt(i) < 32) ? "" : ch; }
    out = out.replace(/\s+/g, "_").replace(/^_+|_+$/g, "");
    return out || "image";
  }
  const frameMeasure = document.createElement("span");
  frameMeasure.style.cssText = "position:absolute;left:-9999px;top:-9999px;white-space:pre;visibility:hidden;";
  document.body.appendChild(frameMeasure);
  frameNameInput.removeAttribute("size");
  function updateFrameWidth() {
    const cs = getComputedStyle(frameNameInput);
    frameMeasure.style.fontFamily = cs.fontFamily; frameMeasure.style.fontSize = cs.fontSize; frameMeasure.style.fontWeight = cs.fontWeight;
    frameMeasure.textContent = frameNameInput.value || frameNameInput.placeholder || "";
    frameNameInput.style.width = (frameMeasure.offsetWidth + 8) + "px";
  }
  function syncFrameName() { frameNameInput.placeholder = autoFrameName(); updateFrameWidth(); }
  frameNameInput.addEventListener("input", () => { state.frameName = frameNameInput.value; updateFrameWidth(); save(); });

  // ===== ズーム / フィット =====
  const stage = $("stage"), zoomVal = $("zoomVal");
  function computeFit() {
    const pad = 96;
    const availW = (stage.clientWidth || 800) - pad;
    const availH = (stage.clientHeight || 600) - pad;
    let f = Math.min(availW / state.w, availH / state.h);
    if (!isFinite(f) || f <= 0) f = 1;
    return Math.min(f, 1);
  }
  function applyView() {
    if (state.fitMode) state.zoom = computeFit();
    const z = state.zoom;
    canvas.style.width = (state.w * z) + "px";
    canvas.style.height = (state.h * z) + "px";
    canvas.style.borderRadius = (clampRadius(state.radius) * z) + "px";
    zoomVal.textContent = Math.round(z * 100) + "%";
  }
  function fit() { state.fitMode = true; applyView(); }
  function zoomBy(f) { state.fitMode = false; state.zoom = Math.max(0.05, Math.min(8, state.zoom * f)); applyView(); }
  function zoomTo(z) { state.fitMode = false; state.zoom = z; applyView(); }
  $("zoomIn").addEventListener("click", () => zoomBy(1.25));
  $("zoomOut").addEventListener("click", () => zoomBy(0.8));
  $("zoomReset").addEventListener("click", () => zoomTo(1));
  $("zoomFit").addEventListener("click", fit);
  window.addEventListener("resize", () => { if (state.fitMode) applyView(); });

  // ===== レイヤーUIの表示／非表示 =====
  function updateLayerUI() {
    const on = patternOn();
    patChipsEl.classList.toggle("is-disabled", !on);
    $("patAdjustGroup").hidden = !on;
    $("patColorGroup").hidden = !on;
    $("textColorGroup").hidden = state.showText === false;
    updateThickEnabled();
    updateDirVisible();
    updateTextEnabled();
  }

  // ===== UI を state に同期 =====
  function syncUI() {
    wInput.value = state.w; hInput.value = state.h;
    tileSlider.value = state.tile; tilePx.value = state.tile;
    thickSlider.value = Math.round(state.thick * 100); thickPct.value = Math.round(state.thick * 100);
    patOpacitySlider.value = Math.round(state.patOpacity * 100); patOpacityPct.value = Math.round(state.patOpacity * 100);
    labelInput.value = state.label || "";
    $("showText").checked = state.showText !== false;
    $("fontFamily").value = state.font || "sans";
    fontScaleInput.value = state.fontScale;
    $("showPattern").checked = state.showPattern !== false;
    applyBg(state.bg); applyPat(state.patColor); applyText(state.textColor);
    syncWellActives();
    frameNameInput.value = state.frameName || "";
    updateTransparent();
    updateLayerUI();
    syncRadius(); syncPreset(); syncFrameName();
  }

  // ===== レンダリング =====
  function render() {
    const { w, h } = state;
    canvas.width = w; canvas.height = h;
    const r = clampRadius(state.radius);
    const fillBg = !state.transparent;

    ctx.clearRect(0, 0, w, h);
    ctx.save();
    roundRectPath(ctx, 0, 0, w, h, r);
    ctx.clip();

    // 背景レイヤー
    if (fillBg) { ctx.fillStyle = state.bg; ctx.fillRect(0, 0, w, h); }

    // 模様レイヤー（不透明度を反映）
    if (patternOn()) {
      const T = Math.max(8, state.tile);
      ctx.save();
      ctx.globalAlpha = state.patOpacity;
      (DRAW[state.pattern] || DRAW.dots)(ctx, w, h, T, state.thick, state.patColor, state.stripeDir);
      ctx.restore();
    }

    // テキストレイヤー（中央）
    if (state.showText) {
      const fg = state.textColor;
      const fontSize = Math.max(4, Math.round(autoBase() * state.fontScale));
      const raw = displayLabel();
      const lines = raw.split("\n");
      const lh = fontSize * 1.25;
      ctx.fillStyle = fg;
      ctx.font = "600 " + fontSize + "px " + (FONTS[state.font] || FONTS.sans);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const startY = h / 2 - (lh * (lines.length - 1)) / 2;
      lines.forEach((ln, i) => ctx.fillText(ln, w / 2, startY + i * lh));
      if (fontPx && document.activeElement !== fontPx) fontPx.value = fontSize;
    }
    ctx.restore();

    // デフォルト白背景は薄い枠線（Notionコールアウト準拠）
    if (fillBg && state.bgIndex === 0 && String(state.bg).toLowerCase() === "#ffffff") {
      const lw = Math.max(1, Math.round(Math.min(w, h) * 0.0025));
      ctx.lineWidth = lw; ctx.strokeStyle = "rgba(55,53,47,0.16)";
      roundRectPath(ctx, lw / 2, lw / 2, w - lw, h - lw, Math.max(0, r - lw / 2));
      ctx.stroke();
    }

    const tag = patternOn() ? patternDef(state.pattern).name : (state.showText ? "テキスト" : "無地");
    meta.textContent = w + " × " + h + " px  ·  " + tag + (state.transparent ? "・透過" : "") + "  ·  PNG";
    applyView();
    save();
  }

  function showToast(msg) {
    const t = $("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 1800);
  }

  $("download").addEventListener("click", () => {
    const link = document.createElement("a");
    link.download = frameFileName() + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    showToast("ダウンロードしました");
  });
  $("copy").addEventListener("click", async () => {
    try {
      const blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
      showToast("クリップボードにコピーしました");
    } catch (e) { showToast("コピー非対応のブラウザです"); }
  });

  // ===== デフォルトに戻す =====
  const DEFAULTS = {
    w: 1500, h: 600, transparent: false,
    bgIndex: 7, bg: BG[7],
    showPattern: true, pattern: "gingham", stripeDir: "v", tile: 64, thick: 0.5, patIndex: 17, patColor: INK[7], patOpacity: 0.3,
    showText: false, label: "", font: "sans", fontScale: null, fontAuto: true,
    textIndex: 10, textColor: INK[0],
    radius: 0, preset: "Cover", frameName: "", zoom: 1, fitMode: true,
  };
  function resetToDefault() {
    try { localStorage.removeItem(KEY); } catch (e) {}
    Object.assign(state, JSON.parse(JSON.stringify(DEFAULTS)));
    buildSwatches(bgSwatchesEl, ALLCOLORS, () => state.bgIndex, selectBg);
    buildSwatches(patSwatchesEl, ALLCOLORS, () => state.patIndex, selectPat);
    buildSwatches(textSwatchesEl, ALLCOLORS, () => state.textIndex, selectText);
    buildPatChips(); buildDirs();
    applyAutoFont();
    syncUI();
    state.fitMode = true;
    render();
    showToast("デフォルトに戻しました");
  }
  $("reset").addEventListener("click", resetToDefault);

  // ===== 初期化 =====
  load();
  if (!PATTERNS.some((p) => p.id === state.pattern)) state.pattern = "dots";
  if (state.fontAuto !== false || state.fontScale == null) applyAutoFont();
  buildSwatches(bgSwatchesEl, ALLCOLORS, () => state.bgIndex, selectBg);
  buildSwatches(patSwatchesEl, ALLCOLORS, () => state.patIndex, selectPat);
  buildSwatches(textSwatchesEl, ALLCOLORS, () => state.textIndex, selectText);
  buildPatChips(); buildDirs();
  syncUI();
  render();
  ensureFontThenRender();

  // 開発用ライブリロード（localhostでhttp配信中のみ）
  if (location.protocol === "http:" && (location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
    let lastTag = null, busy = false;
    async function checkReload() {
      if (busy) return; busy = true;
      try {
        const res = await fetch(location.pathname, { method: "HEAD", cache: "no-store" });
        const tag = res.headers.get("last-modified") || res.headers.get("etag");
        if (lastTag && tag && tag !== lastTag) { location.reload(); return; }
        lastTag = tag;
      } catch (e) {}
      busy = false;
    }
    setInterval(checkReload, 1000);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") checkReload(); });
    window.addEventListener("focus", checkReload);
    window.addEventListener("pageshow", checkReload);
    checkReload();
  }
})();
</script>
</body>
</html>
